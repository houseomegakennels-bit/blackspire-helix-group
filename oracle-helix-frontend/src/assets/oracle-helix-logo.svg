<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="helixGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.72 0.19 240);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(0.66 0.25 295);stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="90" fill="url(#helixGrad)" opacity="0.15"/>
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#helixGrad)" stroke-width="3"/>
  <!-- Helix double-helix shape -->
  <path d="M 60 60 Q 100 80 140 60 Q 100 40 60 60Z" fill="url(#helixGrad)" opacity="0.8"/>
  <path d="M 60 100 Q 100 120 140 100 Q 100 80 60 100Z" fill="url(#helixGrad)" opacity="0.6"/>
  <path d="M 60 140 Q 100 160 140 140 Q 100 120 60 140Z" fill="url(#helixGrad)" opacity="0.4"/>
  <!-- Center glow -->
  <circle cx="100" cy="100" r="18" fill="url(#helixGrad)" opacity="0.9"/>
  <circle cx="100" cy="100" r="10" fill="white" opacity="0.9"/>
  <!-- Orbit lines -->
  <ellipse cx="100" cy="100" rx="80" ry="30" fill="none" stroke="url(#helixGrad)" stroke-width="1.5" opacity="0.5" transform="rotate(-30 100 100)"/>
  <ellipse cx="100" cy="100" rx="80" ry="30" fill="none" stroke="url(#helixGrad)" stroke-width="1.5" opacity="0.5" transform="rotate(30 100 100)"/>
</svg>
