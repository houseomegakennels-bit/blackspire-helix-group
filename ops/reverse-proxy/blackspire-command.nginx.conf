# Blackspire Command — reverse proxy + TLS termination (REVIEW TEMPLATE, NOT INSTALLED)
#
# This file is a reviewed template only. It is NOT installed, symlinked, or loaded by any
# repository change. An operator applies it separately, under blocker #1 approval, after
# substituting the approved public hostname and confirming certificates exist.
#
# Design facts (verified against the app on 2026-07-21):
#   - The app is plain HTTP on a private, loopback-only port (no in-app TLS). TLS MUST
#     terminate here. The upstream below MUST match the explicit PORT in the production
#     environment file; 8789 is the reviewed preference. Ports 8787 (existing API/worker) and
#     8788 (restricted staging) are reserved and must never appear here.
#   - The app sets its OWN strict Content-Security-Policy, HSTS, X-Frame-Options DENY,
#     X-Content-Type-Options nosniff, Referrer-Policy, and Permissions-Policy. This proxy
#     therefore does NOT add, rewrite, or duplicate any security header — it passes the
#     app's responses through untouched so the strict CSP is preserved exactly.
#   - No WebSocket or SSE is used, so no Upgrade/streaming handling is required. HTTP/1.1
#     keepalive to the upstream is enabled; connection reuse is safe.
#   - Public routes that must work before auth: /health, /ready, /, /jarvis, the static
#     asset allowlist (/manifest.webmanifest, /sw.js, /jarvis.css, /jarvis.js,
#     /helix-core.js), /api/auth/login, /api/auth/session. All are plain proxied; no route
#     is special-cased here, so nothing about the auth surface widens.
#
# REQUIRED operator substitution — the approved public hostname is UNVERIFIED and is not
# recorded anywhere in the repository. Replace command.EXAMPLE-APPROVED-HOST.invalid with
# the real approved hostname before use. Do not invent a hostname.

upstream blackspire_command {
    # Loopback-only application port. Keep this in sync with BIND_HOST/PORT in
    # /etc/blackspire/command.env (confirm with `node scripts/select-production-port.js`).
    server 127.0.0.1:8789;
    keepalive 16;
}

# ---- HTTP :80 — HTTPS-only redirect (plus ACME http-01 challenge path) ----
server {
    listen 80;
    listen [::]:80;
    server_name command.EXAMPLE-APPROVED-HOST.invalid;

    # Allow certbot webroot/http-01 challenges without redirecting them.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS :443 — TLS termination, reverse proxy to the private app port ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name command.EXAMPLE-APPROVED-HOST.invalid;

    # Certificates are issued/renewed by certbot (see README.md). These paths are the
    # standard Let's Encrypt live paths for the approved hostname.
    ssl_certificate     /etc/letsencrypt/live/command.EXAMPLE-APPROVED-HOST.invalid/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/command.EXAMPLE-APPROVED-HOST.invalid/privkey.pem;
    # Managed TLS policy (TLSv1.2 + TLSv1.3, modern ciphers) — installed by certbot.
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Telegram attachment uploads flow through the API; cap request bodies conservatively.
    client_max_body_size 25m;

    # NOTE: intentionally no add_header here. The application owns CSP/HSTS/etc.; adding
    # them at the proxy would duplicate or weaken the app's strict policy.

    location / {
        proxy_pass http://blackspire_command;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Forwarded-header contract. The app honors X-Forwarded-* only when TRUST_PROXY=true, so
        # the production profile must set TRUST_PROXY=true. This template assumes exactly ONE
        # trusted proxy hop, so it OVERWRITES X-Forwarded-For with the connecting client address
        # ($remote_addr) instead of appending to a client-supplied value ($proxy_add_x_forwarded_for).
        # That prevents a client from injecting a spoofed leftmost X-Forwarded-For to forge its
        # rate-limit or audit identity (the app reads the leftmost token). If a second trusted
        # proxy is ever placed in front of this one, revisit this line and the app's parsing.
        # Secure session cookies are emitted whenever NODE_ENV=production (there is no separate
        # SESSION_COOKIE_SECURE flag in the app); this proxy asserts X-Forwarded-Proto=https so
        # those Secure cookies are honored end to end.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Health can be scraped over TLS too; it is public in the app and needs no auth.
    location = /health {
        proxy_pass http://blackspire_command;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        access_log off;
    }
}
